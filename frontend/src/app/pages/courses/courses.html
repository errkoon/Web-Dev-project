<p>courses works!</p>
<div class="courses-container">
  <h2>My Courses</h2>

  <div class="form-block">
    <input [(ngModel)]="newCourse.name" placeholder="Course name">
    <input [(ngModel)]="newCourse.description" placeholder="Description">
    <button (click)="createCourse()">Create Course</button>
  </div>

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  @for (course of courses; track course.id) {
    <div class="course-card">
      <h3>{{ course.name }}</h3>
      <p>{{ course.description }}</p>

      @if (progressMap[course.id] > 0) {
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="progressMap[course.id]"></div>
        </div>
        <span>{{ progressMap[course.id] }}%</span>
      } @else {
        <span class="no-progress">Progress: 0%</span>
      }

      <div class="actions">
        <input type="number" min="0" max="100"
          [(ngModel)]="progressMap[course.id]"
          placeholder="Progress %">
        <button (click)="updateProgress(course.id, progressMap[course.id])">
          Update Progress
        </button>
        <button class="delete-btn" (click)="deleteCourse(course.id)">
          Delete
        </button>
      </div>
    </div>
  }
</div>
