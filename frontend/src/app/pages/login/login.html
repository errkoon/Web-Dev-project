<div class="ocean-bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M3 14V7a2 2 0 012-2h4v9H5a2 2 0 01-2-2z" fill="#fff"/>
            <path d="M9 5h3a2 2 0 012 2v7a2 2 0 01-2 2H9V5z" fill="rgba(255,255,255,0.6)"/>
          </svg>
        </div>
        <span class="logo-text">StudyFlow</span>
      </div>

      <h2 class="login-title">Welcome back</h2>
      <p class="login-sub">Sign in to your account</p>

      <div class="input-group">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="6" r="3" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <path d="M2 14c0-3 2.7-5 6-5s6 2 6 5" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input [(ngModel)]="username" placeholder="Username" type="text" (keydown.enter)="login()" class="inp">
      </div>

      <div class="input-group">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="3" y="7" width="10" height="7" rx="2" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          <path d="M5 7V5a3 3 0 016 0v2" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input [(ngModel)]="password" placeholder="Password" type="password" (keydown.enter)="login()" class="inp">
      </div>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <button (click)="login()" class="btn-login">Sign In</button>

    </div>
  </div>
</div>
